<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Denrées du Patidou</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e0808">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap">
<style>
:root {
  --bg-deep:      #0f0303;
  --bg-base:      #1e0808;
  --bg-surface:   #2d0f0f;
  --bg-raised:    #3d1515;
  --bg-hover:     #4a1c1c;
  --gold:         #c9a84c;
  --gold-light:   #e8c96d;
  --gold-dim:     #7a5e1a;
  --gold-border:  #5a3e0e;
  --crimson:      #8b1515;
  --crimson-light:#c02828;
  --parchment:    #f5e6c8;
  --parchment-dim:#c8a87a;
  --parchment-muted:#8c6a3a;
  --ok:           #1e4d1e;
  --ok-bar:       #2e7a2e;
  --ok-text:      #6dbd6d;
  --low:          #5a3a08;
  --low-bar:      #a06010;
  --low-text:     #f0a830;
  --critical:     #5a0e0e;
  --critical-bar: #a01818;
  --critical-text:#f04040;
  --depleted-bg:  #3a0808;
  --depleted-text:#e03030;
  --shadow:       0 4px 24px rgba(0,0,0,0.7);
  --radius:       10px;
  --radius-sm:    6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--parchment);
  font-family: 'Crimson Text', 'Palatino Linotype', Georgia, serif;
  font-size: 16px;
  -webkit-tap-highlight-color: transparent;
}
#app {
  display: flex; flex-direction: column;
  height: 100dvh; width: 100%;
  max-width: 520px; margin: 0 auto;
  background: var(--bg-base);
  position: relative;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  flex-shrink: 0;
  background: var(--bg-deep);
  border-bottom: 2px solid var(--gold-dim);
  padding: 12px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative;
}
.header::after {
  content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
  width: 60%; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 2px;
}
.header-left { display: flex; align-items: center; gap: 10px; flex: 1; }
.back-btn {
  background: none; border: 1px solid var(--gold-dim); border-radius: var(--radius-sm);
  color: var(--gold); font-size: 18px; width: 36px; height: 36px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.back-btn:active { background: var(--bg-raised); }
.header-title {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 15px; font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 0.05em;
  line-height: 1.2;
  flex: 1;
}
.header-subtitle {
  font-family: 'Crimson Text', serif;
  font-size: 12px; color: var(--parchment-muted);
  letter-spacing: 0.03em;
}
.header-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  background: none; border: 1px solid var(--gold-dim); border-radius: var(--radius-sm);
  color: var(--gold); font-size: 16px; width: 36px; height: 36px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.icon-btn:active { background: var(--bg-raised); }
.sync-status {
  font-size: 10px; color: var(--parchment-muted);
  text-align: center; line-height: 1;
}
.sync-status.syncing { color: var(--gold); animation: pulse 1s infinite; }
.sync-status.error { color: var(--critical-text); }
.sync-status.ok { color: var(--ok-text); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── SCROLL AREA ── */
.content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) var(--bg-surface);
}
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: var(--bg-surface); }
.content::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  flex-shrink: 0;
  display: flex;
  background: var(--bg-deep);
  border-top: 2px solid var(--gold-dim);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-btn {
  flex: 1; background: none; border: none;
  color: var(--parchment-muted); cursor: pointer;
  padding: 10px 8px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.03em;
  transition: color 0.2s;
}
.nav-btn .nav-icon { font-size: 20px; }
.nav-btn.active { color: var(--gold-light); }
.nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(201,168,76,0.6)); }

/* ── ZONE GRID ── */
.zones-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.zone-card {
  background: var(--bg-surface);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 16px 12px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
}
.zone-card:active { background: var(--bg-hover); border-color: var(--gold-dim); }
.zone-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}
.zone-icon { font-size: 32px; line-height: 1; }
.zone-name {
  font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600;
  color: var(--parchment); text-align: center; letter-spacing: 0.04em;
}
.zone-stats {
  font-size: 11px; color: var(--parchment-muted);
  text-align: center;
}
.zone-health {
  width: 100%; height: 4px; background: var(--bg-raised);
  border-radius: 2px; overflow: hidden;
}
.zone-health-bar {
  height: 100%; border-radius: 2px;
  transition: width 0.4s ease;
}
.zone-alert-badge {
  position: absolute; top: 8px; right: 8px;
  background: var(--critical-bar); color: #fff;
  font-size: 9px; font-weight: bold;
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* ── SUBZONE LIST ── */
.subzone-list { display: flex; flex-direction: column; gap: 10px; }
.subzone-card {
  background: var(--bg-surface); border: 1px solid var(--gold-border);
  border-radius: var(--radius); padding: 14px 16px;
  cursor: pointer; display: flex; align-items: center; gap: 14px;
  transition: background 0.2s;
}
.subzone-card:active { background: var(--bg-hover); }
.subzone-info { flex: 1; }
.subzone-name {
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
  color: var(--parchment); letter-spacing: 0.03em;
}
.subzone-count { font-size: 12px; color: var(--parchment-muted); margin-top: 2px; }
.subzone-health { width: 80px; }
.subzone-health-bar-bg {
  width: 100%; height: 6px; background: var(--bg-raised); border-radius: 3px; overflow: hidden;
}
.subzone-health-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.subzone-health-label { font-size: 10px; color: var(--parchment-muted); text-align: right; margin-top: 2px; }
.subzone-arrow { color: var(--gold-dim); font-size: 16px; }
.subzone-alert { color: var(--critical-text); font-size: 13px; }

/* ── ITEM LIST ── */
.items-section-title {
  font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold-dim);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 4px;
  border-bottom: 1px solid var(--gold-border);
}
.item-list { display: flex; flex-direction: column; gap: 8px; }
.item-card {
  background: var(--bg-surface); border: 1px solid var(--gold-border);
  border-radius: var(--radius); padding: 12px 14px;
  cursor: pointer; transition: background 0.2s;
  position: relative; overflow: hidden;
}
.item-card:active { background: var(--bg-hover); }
.item-card.depleted {
  background: var(--depleted-bg); border-color: var(--critical-bar);
  opacity: 0.85;
}
.item-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.item-name {
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
  color: var(--parchment); flex: 1; letter-spacing: 0.02em;
}
.item-card.depleted .item-name { color: var(--depleted-text); }
.item-status-badge {
  font-size: 10px; font-family: 'Crimson Text', serif;
  padding: 2px 7px; border-radius: 10px; flex-shrink: 0;
  font-style: italic; letter-spacing: 0.02em;
}
.badge-ok      { background: var(--ok);       color: var(--ok-text); }
.badge-low     { background: var(--low);      color: var(--low-text); }
.badge-critical{ background: var(--critical); color: var(--critical-text); }
.badge-depleted{ background: var(--critical); color: var(--depleted-text); font-weight: bold; }

.item-qty {
  font-size: 12px; color: var(--parchment-dim); margin: 4px 0 8px;
}
.item-bar-bg {
  width: 100%; height: 6px; background: var(--bg-raised); border-radius: 3px; overflow: hidden;
}
.item-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.item-bar-labels {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--parchment-muted); margin-top: 3px;
}
.bar-ok       { background: linear-gradient(90deg, var(--ok-bar), #4dbd4d); }
.bar-low      { background: linear-gradient(90deg, var(--low-bar), #d08020); }
.bar-critical { background: linear-gradient(90deg, var(--critical-bar), #d03030); }
.bar-depleted { background: #5a0e0e; width: 0% !important; }

/* ── FAB ── */
.fab {
  position: absolute; bottom: 80px; right: 20px;
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, var(--crimson-light), var(--crimson));
  border: 2px solid var(--gold);
  color: var(--gold-light); font-size: 24px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 12px rgba(201,168,76,0.2);
  z-index: 10;
  transition: transform 0.1s;
}
.fab:active { transform: scale(0.93); }

/* ── SHOPPING LIST ── */
.shopping-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.shopping-title {
  font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700;
  color: var(--gold-light);
}
.shopping-clear-btn {
  background: none; border: 1px solid var(--gold-border);
  color: var(--parchment-muted); font-family: 'Crimson Text', serif;
  font-size: 13px; padding: 4px 10px; border-radius: var(--radius-sm);
  cursor: pointer;
}
.shopping-item {
  background: var(--bg-surface); border: 1px solid var(--gold-border);
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: background 0.2s;
}
.shopping-item.checked {
  opacity: 0.5;
  text-decoration: line-through;
}
.shopping-item:active { background: var(--bg-hover); }
.shopping-checkbox {
  width: 22px; height: 22px; border-radius: 4px;
  border: 2px solid var(--gold-dim); background: var(--bg-raised);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 13px; color: var(--gold);
}
.shopping-item.checked .shopping-checkbox { background: var(--ok); border-color: var(--ok-bar); }
.shopping-item-info { flex: 1; }
.shopping-item-name {
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
  color: var(--parchment); letter-spacing: 0.02em;
}
.shopping-item-meta { font-size: 11px; color: var(--parchment-muted); margin-top: 2px; }
.shopping-item-source {
  font-size: 10px; padding: 2px 6px; border-radius: 8px;
  background: var(--depleted-bg); color: var(--depleted-text);
  flex-shrink: 0; font-style: italic;
}
.shopping-item-source.manual { background: var(--bg-raised); color: var(--gold-dim); }
.shopping-add-btn {
  width: 100%; background: var(--bg-surface); border: 1px dashed var(--gold-border);
  border-radius: var(--radius); padding: 12px;
  color: var(--parchment-muted); font-family: 'Crimson Text', serif; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 4px;
}
.shopping-add-btn:active { background: var(--bg-hover); }
.shopping-empty {
  text-align: center; padding: 40px 20px;
  color: var(--parchment-muted); font-style: italic; font-size: 15px;
}
.shopping-empty .empty-icon { font-size: 40px; display: block; margin-bottom: 12px; }

/* ── MODAL ── */
.modal-overlay {
  position: absolute; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.modal-overlay.center { align-items: center; padding: 16px; }
.modal {
  background: var(--bg-surface);
  border: 1px solid var(--gold-dim);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%; max-height: 92dvh;
  overflow-y: auto;
  box-shadow: var(--shadow), 0 0 30px rgba(201,168,76,0.1);
}
.modal-overlay.center .modal { border-radius: var(--radius); max-width: 420px; }
.modal-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--gold-border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg-surface); z-index: 1;
}
.modal-title {
  font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
  color: var(--gold-light); letter-spacing: 0.04em;
}
.modal-close {
  background: none; border: none; color: var(--parchment-muted);
  font-size: 20px; cursor: pointer; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

/* ── FORM ── */
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label {
  font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: 0.08em; text-transform: uppercase;
}
.form-input, .form-select {
  background: var(--bg-raised); border: 1px solid var(--gold-border);
  border-radius: var(--radius-sm); color: var(--parchment);
  font-family: 'Crimson Text', serif; font-size: 15px;
  padding: 9px 12px; width: 100%; outline: none;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(--gold-dim); }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.form-hint { font-size: 11px; color: var(--parchment-muted); font-style: italic; }
.form-range-row { display: flex; align-items: center; gap: 10px; }
.form-range { flex: 1; accent-color: var(--gold); cursor: pointer; }
.form-range-val {
  font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600;
  color: var(--gold-light); min-width: 38px; text-align: right;
}
.form-divider {
  height: 1px; background: var(--gold-border); margin: 2px 0;
}
.modal-footer {
  padding: 14px 18px 18px;
  display: flex; gap: 10px;
  border-top: 1px solid var(--gold-border);
}
.btn {
  flex: 1; padding: 11px 16px;
  border-radius: var(--radius-sm); font-family: 'Cinzel', serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
  cursor: pointer; border: none; transition: opacity 0.15s;
}
.btn:active { opacity: 0.8; }
.btn-primary {
  background: linear-gradient(135deg, var(--crimson-light), var(--crimson));
  color: var(--gold-light); border: 1px solid var(--gold-dim);
}
.btn-ghost {
  background: var(--bg-raised); color: var(--parchment-dim);
  border: 1px solid var(--gold-border);
}
.btn-danger {
  background: var(--depleted-bg); color: var(--depleted-text);
  border: 1px solid var(--critical-bar);
}
.btn-sm { padding: 7px 12px; font-size: 11px; }

/* ── TOAST ── */
.toast {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--bg-raised); border: 1px solid var(--gold-dim);
  color: var(--parchment); font-family: 'Crimson Text', serif;
  font-size: 14px; padding: 10px 18px; border-radius: 20px;
  white-space: nowrap; z-index: 200;
  box-shadow: var(--shadow);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
}
@keyframes toastIn  { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes toastOut { to{opacity:0} }

/* ── DECORATIVE ── */
.ornament {
  text-align: center; color: var(--gold-dim);
  font-size: 18px; letter-spacing: 8px; margin: 8px 0;
  user-select: none;
}
.section-divider {
  height: 1px; margin: 12px 0;
  background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
}
.empty-state {
  text-align: center; padding: 32px 20px;
  color: var(--parchment-muted); font-style: italic; font-size: 15px;
}
.empty-state .icon { font-size: 36px; display: block; margin-bottom: 10px; }

/* ── SETTINGS ── */
.settings-section-title {
  font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: 0.1em; text-transform: uppercase;
  padding: 8px 0 4px; border-bottom: 1px solid var(--gold-border); margin-bottom: 10px;
}
.settings-info {
  font-size: 13px; color: var(--parchment-muted); line-height: 1.5;
  font-style: italic; background: var(--bg-raised);
  border: 1px solid var(--gold-border); border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.settings-info a { color: var(--gold); }
.gist-id-display {
  font-family: monospace; font-size: 11px; color: var(--gold-dim);
  word-break: break-all; margin-top: 4px;
}
.copy-btn {
  background: var(--bg-raised); border: 1px solid var(--gold-border);
  color: var(--parchment-dim); font-size: 11px; padding: 3px 8px;
  border-radius: 4px; cursor: pointer; margin-top: 4px;
}

/* ── ITEM EDIT ACTIONS ── */
.item-actions {
  display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
}
.quick-set-btn {
  flex: 1; min-width: 60px;
  background: var(--bg-raised); border: 1px solid var(--gold-border);
  color: var(--parchment-dim); font-family: 'Crimson Text', serif;
  font-size: 13px; padding: 6px; border-radius: var(--radius-sm);
  cursor: pointer; text-align: center;
}
.quick-set-btn:active { background: var(--bg-hover); }

/* ── CONFIRM DIALOG ── */
.confirm-dialog {
  background: var(--bg-surface); border: 1px solid var(--gold-dim);
  border-radius: var(--radius); padding: 24px 20px;
  max-width: 320px; width: 100%; text-align: center;
}
.confirm-dialog p {
  font-size: 15px; color: var(--parchment); margin: 12px 0 20px;
  line-height: 1.5;
}
.confirm-dialog .confirm-title {
  font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold-light);
  font-weight: 700;
}
.confirm-dialog .btn-row { display: flex; gap: 10px; }
</style>
</head>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURATION DES ZONES
// ═══════════════════════════════════════════════════════
const ZONES_CONFIG = [
  { id:'cuisine',    name:'Cuisine',       icon:'🍳', subzones:[
    'Fournitures de cuisine','Nourriture frigo','Nourriture non-frigo',
    'Ustensiles','Épices','Huiles & assaisonnements','Boissons'
  ]},
  { id:'sdb',        name:'Salle de bain', icon:'🛁', subzones:[
    'Soins du corps','Soins du visage','Hygiène dentaire','Cosmétiques','Accessoires & linge'
  ]},
  { id:'toilettes',  name:'Toilettes',     icon:'🚽', subzones:[
    'Papier & hygiène','Nettoyants WC'
  ]},
  { id:'menage',     name:'Ménage',        icon:'🧹', subzones:[
    'Produits nettoyants','Matériel de nettoyage','Sacs & poubelles'
  ]},
  { id:'chambre',    name:'Chambre',       icon:'🛏️', subzones:[
    'Literie','Rangement','Divers'
  ]},
  { id:'utilitaires',name:'Utilitaires',  icon:'⚡', subzones:[
    'Piles & électricité','Ampoules','Outillage','Papeterie & bureau'
  ]}
];

// ═══════════════════════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════════════════════
let state = {
  view: 'zones',        // zones | subzones | items
  tab:  'stocks',       // stocks | courses

function loadLocal() {

  try { state.shopping = JSON.parse(localStorage.getItem('denrees_shopping') || '[]'); } catch(e){ state.shopping=[]; }
  try { state.settings = JSON.parse(localStorage.getItem('denrees_settings') || '{}'); } catch(e){ state.settings={}; }
  state.settings.token   = state.settings.token   || '';
  state.settings.gistId  = state.settings.gistId  || '';

}

}

// ═══════════════════════════════════════════════════════
//  GITHUB GIST SYNC
// ═══════════════════════════════════════════════════════
async function syncFromGist() {
  if (!state.settings.token || !state.settings.gistId) return false;
  try {
    state.syncStatus = 'syncing'; renderSyncBadge();
    const r = await fetch(`https://api.github.com/gists/${state.settings.gistId}`, {
      headers: { 'Authorization': `token ${state.settings.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error(r.status);
    const gist = await r.json();
    const file = gist.files['denrees-patidou.json'];
    if (file) {
      const data = JSON.parse(file.content);
      state.items    = data.items    || [];
      state.shopping = data.shopping || [];
      saveLocal();
    }
    state.syncStatus = 'ok';
    state.lastSync = new Date().toISOString();
    localStorage.setItem('denrees_lastSync', state.lastSync);
    renderSyncBadge();
    return true;
  } catch(e) {
    state.syncStatus = 'error'; renderSyncBadge();
    return false;
  }
}

let syncTimer = null;
async function scheduleSyncToGist() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncToGist(), 1500);
}
async function syncToGist() {
  if (!state.settings.token || !state.settings.gistId) return false;
  try {
    state.syncStatus = 'syncing'; renderSyncBadge();
    const data = { items: state.items, shopping: state.shopping };
    const r = await fetch(`https://api.github.com/gists/${state.settings.gistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${state.settings.token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { 'denrees-patidou.json': { content: JSON.stringify(data, null, 2) } } })
    });
    if (!r.ok) throw new Error(r.status);
    state.syncStatus = 'ok';
    state.lastSync = new Date().toISOString();
    localStorage.setItem('denrees_lastSync', state.lastSync);
    renderSyncBadge();
    return true;
  } catch(e) {
    state.syncStatus = 'error'; renderSyncBadge();
    return false;
  }
}

async function createGist(token) {
  const r = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      description: 'Denrées du Patidou — stocks partagés',
      public: false,
      files: { 'denrees-patidou.json': { content: JSON.stringify({ items:[], shopping:[] }, null, 2) } }
    })
  });
  if (!r.ok) throw new Error(r.status);
  const gist = await r.json();
  return gist.id;
}

// ═══════════════════════════════════════════════════════
//  UTILITAIRES
// ═══════════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

function getPercent(item) {
  if (!item.maxQty || item.maxQty <= 0) return null;
  return Math.min(100, Math.max(0, Math.round((item.qty / item.maxQty) * 100)));
}

function getStatus(item) {
  if (item.qty <= 0) return 'depleted';
  const pct = getPercent(item);
  if (pct === null) return 'ok';
  if (pct <= (item.alertThreshold || 20)) return 'critical';
  if (pct <= 40) return 'low';
  return 'ok';
}

function statusLabel(s) {
  return { ok:'Abondant', low:'Faible', critical:'Critique', depleted:'Épuisé' }[s] || s;
}
function statusBadgeClass(s) {
  return { ok:'badge-ok', low:'badge-low', critical:'badge-critical', depleted:'badge-depleted' }[s] || '';
}
function statusBarClass(s) {
  return { ok:'bar-ok', low:'bar-low', critical:'bar-critical', depleted:'bar-depleted' }[s] || 'bar-ok';
}

function zoneHealth(zoneName) {
  const items = state.items.filter(i => i.zone === zoneName);
  if (!items.length) return { pct: 100, alerts: 0, depleted: 0 };
  let totalPct = 0; let alerts = 0; let dep = 0;
  items.forEach(i => {
    const p = getPercent(i) ?? 100;
    totalPct += p;
    const s = getStatus(i);
    if (s === 'depleted') dep++;
    else if (s === 'critical' || s === 'low') alerts++;
  });
  return { pct: Math.round(totalPct / items.length), alerts, depleted: dep };
}

function subzoneHealth(zoneName, subzoneName) {
  const items = state.items.filter(i => i.zone === zoneName && i.subzone === subzoneName);
  if (!items.length) return { pct: 100, alerts: 0 };
  let totalPct = 0; let alerts = 0;
  items.forEach(i => {
    totalPct += (getPercent(i) ?? 100);
    const s = getStatus(i);
    if (s !== 'ok') alerts++;
  });
  return { pct: Math.round(totalPct / items.length), alerts };
}

function healthColor(pct) {
  if (pct <= 10) return 'var(--critical-bar)';
  if (pct <= 40) return 'var(--low-bar)';
  return 'var(--ok-bar)';
}

function syncToShoppingList(item) {
  if (item.qty <= 0) {
    const exists = state.shopping.find(s => s.itemId === item.id);
    if (!exists) {
      state.shopping.push({
        id: uid(), itemId: item.id, name: item.name,
        zone: item.zone, subzone: item.subzone,
        source: 'depleted', checked: false,
        addedAt: new Date().toISOString()
      });
    }
  }
}

function removeFromShoppingIfRestocked(item) {
  if (item.qty > 0) {
    state.shopping = state.shopping.filter(s => s.itemId !== item.id);
  }
}

function syncAllToShopping() {
  state.items.forEach(item => {
    if (item.qty <= 0) syncToShoppingList(item);
    else removeFromShoppingIfRestocked(item);
  });
}

function formatLastSync(iso) {
  if (!iso) return 'jamais';
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'à l\'instant';
  if (diff < 3600) return `il y a ${Math.floor(diff/60)} min`;
  return d.toLocaleDateString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

function renderSyncBadge() {
  const el = document.querySelector('.sync-status');
  if (!el) return;
  const map = { idle:'', syncing:'↻ sync…', ok:'✓ sync', error:'⚠ sync' };
  el.textContent = map[state.syncStatus] || '';
  el.className = 'sync-status ' + state.syncStatus;
}

function buildShell(titleEl, showBack, showSettings = true) {
  const showSync = !!(state.settings.token && state.settings.gistId);
  const syncText = showSync ? (state.syncStatus === 'syncing' ? '↻' : '⟳') : '';
  return `
  <div class="header">
    <div class="header-left">
      ${showBack ? `<button class="back-btn" id="backBtn">◂</button>` : ''}
      <div>
        <div class="header-title">${titleEl}</div>
        <div class="header-subtitle">Denrées du Patidou</div>
      </div>
    </div>
    <div class="header-actions">
      ${showSync ? `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <button class="icon-btn" id="syncBtn" title="Synchroniser">⟳</button>
        <span class="sync-status ${state.syncStatus}">${state.syncStatus==='syncing'?'sync…':state.syncStatus==='ok'?'✓':state.syncStatus==='error'?'⚠':''}</span>
      </div>` : ''}
      <button class="icon-btn" id="settingsBtn" title="Paramètres">⚙</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
  <nav class="bottom-nav">
    <button class="nav-btn ${state.tab==='stocks'?'active':''}" data-tab="stocks">

    <button class="nav-btn ${state.tab==='courses'?'active':''}" data-tab="courses">

      <span>Courses ${state.shopping.filter(s=>!s.checked).length>0?'('+state.shopping.filter(s=>!s.checked).length+')':''}</span>
    </button>
  </nav>`;
}

function attachShellEvents() {
  document.querySelectorAll('.nav-btn[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.tab = btn.dataset.tab;
      if (state.tab === 'stocks') { state.view = 'zones'; state.zone = null; state.subzone = null; }
      render();
    });
  });
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.addEventListener('click', () => {
    if (state.view === 'items') { state.view = 'subzones'; state.subzone = null; }
    else if (state.view === 'subzones') { state.view = 'zones'; state.zone = null; }
    render();
  });
  const syncBtn = document.getElementById('syncBtn');
  if (syncBtn) syncBtn.addEventListener('click', async () => {
    await syncFromGist();
    render();
    showToast('Grimoire synchronisé ✓');
  });
  document.getElementById('settingsBtn').addEventListener('click', showSettingsModal);
}

  overlay.id = 'modalOverlay';

    </div>
    <div class="form-divider"></div>
    ${s === 'depleted' ? `<div style="text-align:center;color:var(--depleted-text);font-style:italic;font-size:14px">⚠ Cette denrée est épuisée — elle figure dans la liste de courses.</div>` : ''}
  </div>
  <div class="modal-footer" style="flex-wrap:wrap;gap:8px">
    <button class="btn btn-danger btn-sm" id="mDelete" style="flex:0 0 auto">Supprimer</button>
    <button class="btn btn-ghost" id="mCancel" style="flex:1">Annuler</button>
    <button class="btn btn-primary" id="mSave" style="flex:2">Sauvegarder</button>
  </div>`;
  openModal(html);
  document.getElementById('mClose').addEventListener('click', closeModal);
  document.getElementById('mCancel').addEventListener('click', closeModal);
  const range = document.getElementById('fThreshold');
  range.addEventListener('input', () => {
    const v = range.value + '%';
    document.getElementById('thresholdVal').textContent = v;
    document.getElementById('thresholdValRight').textContent = v;
  });
  document.querySelectorAll('.quick-set-btn[data-q]').forEach(btn => {
    btn.addEventListener('click', () => {
      const qInput = document.getElementById('fQty');
      const max = parseFloat(document.getElementById('fMaxQty').value) || item.maxQty || 0;
      const q = btn.dataset.q;
      if (q === '0') qInput.value = 0;
      else if (q === '25pct') qInput.value = Math.round(max * 0.25);
      else if (q === '50pct') qInput.value = Math.round(max * 0.5);
      else if (q === 'max')   qInput.value = max;
    });
  });
  document.getElementById('mDelete').addEventListener('click', () => {
    showConfirm(`Supprimer "${item.name}" ?`, 'Cette action effacera définitivement cette denrée du grimoire.', () => {
      state.items = state.items.filter(i => i.id !== itemId);
      state.shopping = state.shopping.filter(s => s.itemId !== itemId);
      saveLocal(); scheduleSyncToGist();
      closeModal(); render();
      showToast(`"${item.name}" effacé`);
    });
  });
  document.getElementById('mSave').addEventListener('click', () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) return;
    item.name   = name;
    item.qty    = parseFloat(document.getElementById('fQty').value) || 0;
    item.maxQty = parseFloat(document.getElementById('fMaxQty').value) || 0;
    item.unit   = document.getElementById('fUnit').value.trim();
    item.alertThreshold = parseInt(range.value);
    syncToShoppingList(item);
    removeFromShoppingIfRestocked(item);
    saveLocal(); scheduleSyncToGist();
    closeModal(); render();
    showToast('Denrée mise à jour ✓');
  });
}

// ── AJOUT MANUEL LISTE COURSES ──
function showAddManualShoppingModal() {
  const html = `
  <div class="modal-header">
    <div class="modal-title">📜 Ajouter au Parchemin</div>
    <button class="modal-close" id="mClose">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label class="form-label">Article à acheter</label>
      <input class="form-input" id="fName" placeholder="ex: Pain, Café…" autocomplete="off">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Zone</label>
        <select class="form-select" id="fZone">
          <option value="">— Choisir —</option>
          ${ZONES_CONFIG.map(z => `<option value="${z.name}">${z.name}</option>`).join('')}
        </select>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" id="mCancel">Annuler</button>
    <button class="btn btn-primary" id="mSave">Ajouter</button>
  </div>`;
  openModal(html);
  document.getElementById('mClose').addEventListener('click', closeModal);
  document.getElementById('mCancel').addEventListener('click', closeModal);
  document.getElementById('mSave').addEventListener('click', () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) return;
    const zone = document.getElementById('fZone').value;
    state.shopping.push({ id: uid(), name, zone, subzone:'', source:'manual', checked: false, addedAt: new Date().toISOString() });
    saveLocal(); scheduleSyncToGist();
    closeModal(); render();
    showToast(`"${name}" ajouté ✓`);
  });
}

// ── PARAMÈTRES ──
function showSettingsModal() {
  const hasConfig = !!(state.settings.token && state.settings.gistId);
  const html = `
  <div class="modal-header">
    <div class="modal-title">⚙ Configuration du Grimoire</div>
    <button class="modal-close" id="mClose">✕</button>
  </div>
  <div class="modal-body">
    <div class="settings-section-title">Synchronisation entre téléphones</div>
    <div class="settings-info">
      Pour partager les stocks entre deux téléphones, créez un <strong>Personal Access Token</strong> GitHub avec la portée <em>gist</em>.<br>
      <a href="https://github.com/settings/tokens/new?scopes=gist&description=Denrees+Patidou" target="_blank">→ Créer le token GitHub</a>
    </div>
    <div class="form-group">
      <label class="form-label">Token GitHub (portée gist)</label>
      <input class="form-input" id="fToken" type="password" value="${state.settings.token}" placeholder="ghp_…" autocomplete="off">
    </div>
    ${hasConfig ? `
    <div class="form-group">
      <label class="form-label">ID du Grimoire Partagé (Gist ID)</label>
      <div class="gist-id-display">${state.settings.gistId}</div>
      <button class="copy-btn" id="copyGistId">Copier pour l'autre téléphone</button>
      <div class="form-hint">Sur le second téléphone : même token + ce Gist ID</div>
    </div>` : `
    <div class="form-group">
      <label class="form-label">Gist ID (laisser vide pour en créer un)</label>
      <input class="form-input" id="fGistId" value="${state.settings.gistId}" placeholder="laisser vide = créer automatiquement" autocomplete="off">
    </div>`}
    ${state.lastSync ? `<div class="form-hint" style="text-align:center">Dernière synchro : ${formatLastSync(state.lastSync)}</div>` : ''}
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" id="mCancel">Fermer</button>
    <button class="btn btn-primary" id="mSave">Enregistrer & Tester</button>
  </div>`;
  openModal(html, true);
  document.getElementById('mClose').addEventListener('click', closeModal);
  document.getElementById('mCancel').addEventListener('click', closeModal);
  const copyBtn = document.getElementById('copyGistId');
  if (copyBtn) copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(state.settings.gistId).then(() => showToast('ID copié ✓'));
  });
  document.getElementById('mSave').addEventListener('click', async () => {
    const token = document.getElementById('fToken').value.trim();
    if (!token) { showToast('Token manquant ⚠'); return; }
    const gistInput = document.getElementById('fGistId');
    let gistId = gistInput ? gistInput.value.trim() : state.settings.gistId;
    state.settings.token = token;
    const saveBtn = document.getElementById('mSave');
    saveBtn.textContent = 'Connexion…'; saveBtn.disabled = true;
    try {
      if (!gistId) {
        gistId = await createGist(token);
        showToast('Grimoire partagé créé ✓');
      }
      state.settings.gistId = gistId;
      saveSettings();
      const ok = await syncFromGist();
      if (ok) { showToast('Synchronisation réussie ✓'); closeModal(); render(); }
      else { showToast('Erreur de connexion ⚠'); saveBtn.textContent = 'Enregistrer & Tester'; saveBtn.disabled = false; }
    } catch(e) {
      showToast('Erreur : ' + e.message);
      saveBtn.textContent = 'Enregistrer & Tester'; saveBtn.disabled = false;
    }
  });
}

// ── CONFIRMATION ──
function showConfirm(title, message, onConfirm) {
  const html = `
  <div class="confirm-dialog">
    <div class="confirm-title">${title}</div>
    <p>${message}</p>
    <div class="btn-row">
      <button class="btn btn-ghost" id="cCancel">Annuler</button>
      <button class="btn btn-danger" id="cConfirm">Confirmer</button>
    </div>
  </div>`;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay center';
  overlay.id = 'confirmOverlay';
  overlay.innerHTML = html;
  app.appendChild(overlay);
  overlay.querySelector('#cCancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#cConfirm').addEventListener('click', () => { overlay.remove(); onConfirm(); });
}

// ── TOAST ──
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  app.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

loadLocal();
syncAllToShopping();
render();

if (state.settings.token && state.settings.gistId) {
  syncFromGist().then(() => render());
}
</script>
